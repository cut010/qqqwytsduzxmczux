<svg xmlns="http://www.w3.org/2000/svg" width="600" height="200" viewBox="0 0 600 200">
  <rect width="600" height="200" rx="12" fill="#18181b"/>

  <!-- Success circle -->
  <circle cx="230" cy="85" r="32" fill="#006027" stroke="#2bfa80" stroke-width="2"/>
  <circle cx="230" cy="85" r="32" fill="#2bfa80" opacity="0.15"/>
  <!-- Checkmark -->
  <polyline points="215,85 226,97 248,73" fill="none" stroke="#2bfa80" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Extension name -->
  <text x="290" y="78" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="white" font-weight="600">LIDLT Player</text>

  <!-- Activada badge -->
  <rect x="290" y="90" width="80" height="24" rx="12" fill="#006027"/>
  <text x="330" y="107" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#2bfa80" text-anchor="middle" font-weight="600">Activada</text>

  <!-- Decorative particles -->
  <circle cx="155" cy="50" r="3" fill="#2bfa80" opacity="0.5"/>
  <circle cx="180" cy="35" r="2" fill="#2bfa80" opacity="0.3"/>
  <circle cx="145" cy="120" r="2.5" fill="#2bfa80" opacity="0.4"/>
  <circle cx="420" cy="60" r="2" fill="#2bfa80" opacity="0.3"/>
  <circle cx="440" cy="110" r="3" fill="#2bfa80" opacity="0.4"/>
  <circle cx="460" cy="75" r="2" fill="#2bfa80" opacity="0.25"/>

  <!-- Hint text -->
  <text x="300" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#a1a1aa" text-anchor="middle">&#xA1;La extensi&#xF3;n est&#xE1; lista!</text>
</svg>